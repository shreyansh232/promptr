<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sharp outer square frame - slightly dim -->
  <rect
    x="8"
    y="8"
    width="48"
    height="48"
    fill="#b7ff5a"
    fill-opacity="0.08"
    stroke="#b7ff5a"
    stroke-width="3"
    stroke-opacity="0.4"
  />
  <!-- Terminal Caret - bold and sharp (using filled polygon path) -->
  <path
    d="M22 20 L34 32 L22 44 L16 44 L28 32 L16 20 Z"
    fill="#b7ff5a"
  />
  <!-- Vertical Blinking Cursor - thin and sharp (using filled rect) -->
  <rect
    x="40"
    y="20"
    width="4"
    height="24"
    fill="#b7ff5a"
  />
</svg>
