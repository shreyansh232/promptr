version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: promptr-db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - promptr-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: promptr-server
    ports:
      - '8000:8000'
    environment:
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=mongodb://db:27017
      - DATABASE_NAME=promptr
    env_file:
      - ./server/.env
    depends_on:
      - db
    networks:
      - promptr-network

  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: promptr-frontend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mongodb://db:27017/promptr
      - BACKEND_URL=http://server:8000
    env_file:
      - ./web/.env
    depends_on:
      - db
      - server
    networks:
      - promptr-network

volumes:
  mongo-data:

networks:
  promptr-network:
    driver: bridge
